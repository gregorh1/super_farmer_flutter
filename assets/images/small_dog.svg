<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="52" cy="55" rx="22" ry="16" fill="#FF9800"/>
  <!-- Head -->
  <circle cx="50" cy="34" r="14" fill="#FFB74D"/>
  <!-- Ears (floppy) -->
  <ellipse cx="36" cy="28" rx="6" ry="10" fill="#E65100" transform="rotate(15 36 28)"/>
  <ellipse cx="64" cy="28" rx="6" ry="10" fill="#E65100" transform="rotate(-15 64 28)"/>
  <!-- Eyes -->
  <circle cx="44" cy="32" r="3" fill="white"/>
  <circle cx="44" cy="32" r="1.5" fill="#333"/>
  <circle cx="56" cy="32" r="3" fill="white"/>
  <circle cx="56" cy="32" r="1.5" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="50" cy="38" rx="3" ry="2.5" fill="#333"/>
  <!-- Mouth -->
  <path d="M47 41 Q50 44 53 41" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="34" y="68" width="6" height="16" rx="3" fill="#FF9800"/>
  <rect x="60" y="68" width="6" height="16" rx="3" fill="#FF9800"/>
  <rect x="42" y="70" width="5" height="14" rx="2" fill="#FFB74D"/>
  <rect x="54" y="70" width="5" height="14" rx="2" fill="#FFB74D"/>
  <!-- Tail -->
  <path d="M74 50 Q82 42 78 35" fill="none" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
  <!-- Collar -->
  <path d="M38 44 Q50 48 62 44" fill="none" stroke="#F44336" stroke-width="2.5"/>
</svg>
