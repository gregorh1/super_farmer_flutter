<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="50" cy="55" rx="26" ry="18" fill="#607D8B"/>
  <!-- Belly -->
  <ellipse cx="50" cy="60" rx="14" ry="10" fill="#B0BEC5"/>
  <!-- Head -->
  <ellipse cx="50" cy="30" rx="16" ry="14" fill="#607D8B"/>
  <!-- Ears (tall, pointy) -->
  <polygon points="36,20 30,2 44,16" fill="#607D8B"/>
  <polygon points="37,20 33,6 43,16" fill="#90A4AE"/>
  <polygon points="64,20 70,2 56,16" fill="#607D8B"/>
  <polygon points="63,20 67,6 57,16" fill="#90A4AE"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="36" rx="8" ry="6" fill="#90A4AE"/>
  <!-- Eyes (fierce) -->
  <ellipse cx="42" cy="28" rx="3.5" ry="2.5" fill="#FFC107"/>
  <ellipse cx="42" cy="28" rx="1.5" ry="2" fill="#333"/>
  <ellipse cx="58" cy="28" rx="3.5" ry="2.5" fill="#FFC107"/>
  <ellipse cx="58" cy="28" rx="1.5" ry="2" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="50" cy="34" rx="3" ry="2.5" fill="#263238"/>
  <!-- Mouth -->
  <path d="M44 40 L47 38 L50 40 L53 38 L56 40" fill="none" stroke="#263238" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="30" y="68" width="7" height="18" rx="3" fill="#546E7A"/>
  <rect x="63" y="68" width="7" height="18" rx="3" fill="#546E7A"/>
  <rect x="40" y="70" width="6" height="16" rx="2" fill="#607D8B"/>
  <rect x="55" y="70" width="6" height="16" rx="2" fill="#607D8B"/>
  <!-- Paws -->
  <ellipse cx="33" cy="86" rx="5" ry="3" fill="#455A64"/>
  <ellipse cx="67" cy="86" rx="5" ry="3" fill="#455A64"/>
  <!-- Tail (bushy) -->
  <path d="M76 50 Q86 42 82 34 Q80 30 84 26" fill="none" stroke="#607D8B" stroke-width="6" stroke-linecap="round"/>
  <path d="M82 28 Q80 30 84 26" fill="none" stroke="#B0BEC5" stroke-width="3" stroke-linecap="round"/>
</svg>
