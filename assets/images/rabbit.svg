<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Rabbit body -->
  <ellipse cx="50" cy="62" rx="22" ry="18" fill="#9E9E9E"/>
  <!-- Head -->
  <circle cx="50" cy="42" r="14" fill="#BDBDBD"/>
  <!-- Left ear -->
  <ellipse cx="42" cy="18" rx="5" ry="16" fill="#BDBDBD"/>
  <ellipse cx="42" cy="18" rx="3" ry="12" fill="#F48FB1"/>
  <!-- Right ear -->
  <ellipse cx="58" cy="18" rx="5" ry="16" fill="#BDBDBD"/>
  <ellipse cx="58" cy="18" rx="3" ry="12" fill="#F48FB1"/>
  <!-- Eyes -->
  <circle cx="44" cy="40" r="3" fill="white"/>
  <circle cx="44" cy="40" r="1.5" fill="#333"/>
  <circle cx="56" cy="40" r="3" fill="white"/>
  <circle cx="56" cy="40" r="1.5" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="50" cy="46" rx="2" ry="1.5" fill="#F48FB1"/>
  <!-- Tail -->
  <circle cx="72" cy="60" r="5" fill="white"/>
  <!-- Feet -->
  <ellipse cx="38" cy="80" rx="7" ry="4" fill="#BDBDBD"/>
  <ellipse cx="62" cy="80" rx="7" ry="4" fill="#BDBDBD"/>
</svg>
