  <circle cx="56" cy="28" r="3" fill="white"/>
  <circle cx="56" cy="28" r="1.5" fill="#333"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="36" rx="7" ry="5" fill="#F8BBD0"/>
