<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="50" cy="55" rx="28" ry="18" fill="white"/>
  <!-- Spots -->
  <ellipse cx="40" cy="50" rx="8" ry="6" fill="#795548"/>
  <ellipse cx="60" cy="58" rx="10" ry="7" fill="#795548"/>
  <circle cx="48" cy="62" r="5" fill="#795548"/>
  <!-- Head -->
  <ellipse cx="50" cy="30" rx="14" ry="12" fill="white"/>
  <!-- Horns -->
  <path d="M38 22 Q34 12 30 15" fill="none" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <path d="M62 22 Q66 12 70 15" fill="none" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="36" cy="26" rx="5" ry="3" fill="#F5F5F5"/>
  <ellipse cx="64" cy="26" rx="5" ry="3" fill="#F5F5F5"/>
