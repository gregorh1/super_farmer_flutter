  <rect x="30" y="70" width="6" height="16" rx="2" fill="white"/>
  <rect x="40" y="70" width="6" height="16" rx="2" fill="#795548"/>
  <rect x="54" y="70" width="6" height="16" rx="2" fill="white"/>
  <rect x="64" y="70" width="6" height="16" rx="2" fill="#795548"/>
  <!-- Hooves -->
  <rect x="29" y="84" width="8" height="3" rx="1" fill="#333"/>
  <rect x="39" y="84" width="8" height="3" rx="1" fill="#333"/>
  <rect x="53" y="84" width="8" height="3" rx="1" fill="#333"/>
  <rect x="63" y="84" width="8" height="3" rx="1" fill="#333"/>
