<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Body (large) -->
  <ellipse cx="50" cy="52" rx="28" ry="20" fill="#3F51B5"/>
  <!-- Head -->
  <circle cx="48" cy="28" r="16" fill="#5C6BC0"/>
  <!-- Ears (pointy) -->
  <polygon points="36,16 32,2 42,14" fill="#3F51B5"/>
  <polygon points="58,16 62,2 54,14" fill="#3F51B5"/>
  <!-- Eyes -->
  <circle cx="42" cy="26" r="3.5" fill="white"/>
  <circle cx="42" cy="26" r="1.8" fill="#333"/>
  <circle cx="54" cy="26" r="3.5" fill="white"/>
  <circle cx="54" cy="26" r="1.8" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="48" cy="33" rx="4" ry="3" fill="#1A237E"/>
  <!-- Mouth -->
  <path d="M44 37 Q48 40 52 37" fill="none" stroke="#1A237E" stroke-width="1.5"/>
  <!-- Chest -->
  <ellipse cx="50" cy="50" rx="12" ry="14" fill="#7986CB"/>
  <!-- Legs -->
  <rect x="28" y="66" width="8" height="20" rx="3" fill="#3F51B5"/>
  <rect x="40" y="68" width="7" height="18" rx="3" fill="#5C6BC0"/>
  <rect x="54" y="68" width="7" height="18" rx="3" fill="#5C6BC0"/>
  <rect x="65" y="66" width="8" height="20" rx="3" fill="#3F51B5"/>
  <!-- Paws -->
  <ellipse cx="32" cy="86" rx="5" ry="3" fill="#5C6BC0"/>
  <ellipse cx="69" cy="86" rx="5" ry="3" fill="#5C6BC0"/>
  <!-- Tail -->
  <path d="M78 46 Q88 38 84 28" fill="none" stroke="#3F51B5" stroke-width="5" stroke-linecap="round"/>
  <!-- Collar -->
  <path d="M34 40 Q48 46 62 40" fill="none" stroke="#FFC107" stroke-width="3"/>
</svg>
